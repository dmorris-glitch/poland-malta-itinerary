<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poland & Malta Itinerary</title>
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --navy1: #1a1a2e;
      --navy2: #16213e;
      --navy3: #0f3460;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .header {
      background: linear-gradient(135deg, var(--navy1) 0%, var(--navy2) 50%, var(--navy3) 100%);
      color: white;
      text-align: center;
      padding: 40px 20px 32px;
    }

    .eyebrow {
      font: 600 11px/1.4 "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .subhead {
      font: 14px/1.4 "Helvetica Neue", Arial, sans-serif;
      opacity: 0.6;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font: 11px/1.4 "Helvetica Neue", Arial, sans-serif;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 12px 16px 40px;
    }

    details.day {
      margin-bottom: 10px;
      border-radius: 12px;
      overflow: hidden;
      background: transparent;
    }

    details.day summary {
      list-style: none;
      cursor: pointer;
      background: #fff;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    details.day[open] summary {
      border-width: 2px;
    }
